
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodAdapt | Pulse Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --pulse-cyan: #00f5ff;
        --pulse-dark: #050505;
        --pulse-slate: #1e293b;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--pulse-dark);
        background-image: 
          linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        background-attachment: fixed;
        min-height: 100vh;
        color: #f8fafc;
      }
      .glass {
        background: rgba(10, 10, 10, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 245, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }
      .btn-classic {
        background: linear-gradient(135deg, #00f5ff 0%, #008b8b 100%);
        color: #050505;
        font-weight: 800;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
      }
      .btn-classic:hover {
        transform: scale(1.02);
        box-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
      }
      .neon-border {
        border: 1px solid var(--pulse-cyan);
        box-shadow: inset 0 0 10px rgba(0, 245, 255, 0.2), 0 0 10px rgba(0, 245, 255, 0.2);
      }
      .pulse-animation {
        animation: heartbeat 2s infinite ease-in-out;
      }
      @keyframes heartbeat {
        0% { transform: scale(1); opacity: 0.8; }
        15% { transform: scale(1.1); opacity: 1; }
        30% { transform: scale(1); opacity: 0.8; }
        45% { transform: scale(1.15); opacity: 1; }
        60% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 0.8; }
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--pulse-cyan); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
